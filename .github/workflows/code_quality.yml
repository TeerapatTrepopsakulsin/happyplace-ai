name: Code Quality Checks

on:
  push:
  pull_request:

jobs:
  code-quality-backend:
    name: Code Quality (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Backend Tools
        run: pip install radon ruff mypy bandit

      - name: CC Check
        run: radon cc backend/app/ backend/workers -n C --no-assert -s || exit 1

      - name: Ruff Lint
        run: ruff check backend/app/ backend/workers

      - name: Ruff Format
        run: ruff format --check backend/app/ backend/workers

      - name: Mypy Type Check
        run: mypy backend/app/ backend/workers --ignore-missing-imports

      - name: Bandit Security Check
        run: bandit -r backend/app/ backend/workers -ll

  code-quality-frontend:
    name: Code Quality (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint (Oxlint + ESLint)
        run: npm run lint
        working-directory: frontend

      - name: Prettier Format Check
        run: npx prettier --check src/
        working-directory: frontend

      - name: Type Check & Build
        run: npm run build
        working-directory: frontend

      - name: Audit Security Check
        run: npm audit --audit-level=moderate
        working-directory: frontend
