name: Chatbot Performance Fitness Test

on:
  pull_request:

env:
  TARGET_HOST: "http://localhost:8000"
  USERS: "1"
  SPAWN_RATE: "1"
  RUN_TIME: "60s"

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create backend .env
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          echo "GROQ_API_KEY=$GROQ_API_KEY" >> backend/.env
          echo "JWT_SECRET=$JWT_SECRET" >> backend/.env
          echo "GROQ_MODEL=llama3-70b-8192" >> backend/.env
          echo "DATABASE_URL=postgresql+asyncpg://happyplace:happyplace@db:5432/happyplaceai" >> backend/.env
          echo "REDIS_URL=redis://redis:6379" >> backend/.env
          echo "JWT_ALGORITHM=HS256" >> backend/.env
          echo "JWT_EXPIRE_HOURS=24" >> backend/.env
          echo "DANGER_KEYWORDS=hurt myself,end my life,suicide,kill myself,self-harm" >> backend/.env

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8000/health && break
            echo "Waiting... ($i)"
            sleep 2
            if [ $i -eq 30 ]; then
              echo "Backend failed to start"
              docker compose logs backend
              exit 1
            fi
          done

      - name: Check .env
        run: docker compose exec -T backend cat /app/.env

      - name: Run migrations
        run: docker compose exec -T --workdir /app backend alembic upgrade head

      - name: Seed test users
        run: docker compose exec -T --workdir /app backend python seed.py

      - name: Install Locust
        run: pip install locust

      - name: Run Locust load test
        run: |
          locust \
            --headless \
            --host ${{ env.TARGET_HOST }} \
            --users ${{ env.USERS }} \
            --spawn-rate ${{ env.SPAWN_RATE }} \
            --run-time ${{ env.RUN_TIME }} \
            --locustfile locustfile.py \
            --csv=results \
            --html=report.html \
            --exit-code-on-error 1

      - name: Check backend error logs
        if: always()
        run: docker compose logs backend 2>&1 | grep -i "error\|groq"

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-report
          path: |
            report.html
            results_stats.csv
            results_failures.csv

      - name: Print summary
        if: always()
        run: |
          echo "## Performance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat results_stats.csv | python3 -c "
          import csv, sys
          reader = csv.DictReader(sys.stdin)
          print('| Endpoint | Requests | Failures | Avg (ms) | 95th% (ms) | RPS |')
          print('|---|---|---|---|---|---|')
          for row in reader:
              print(f'| {row[\"Name\"]} | {row[\"Request Count\"]} | {row[\"Failure Count\"]} | {row[\"Average Response Time\"]} | {row[\"95%\"]} | {row[\"Requests/s\"]} |')
          " >> $GITHUB_STEP_SUMMARY
